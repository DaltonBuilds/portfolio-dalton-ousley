name: Build & Deploy Lambda's

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'lambda/**'
      - 'terraform/app-portfolio/**'
  push:
    branches: [main]
    paths:
      - 'lambda/**'
      - 'terraform/app-portfolio/**'

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Always runs - validates Dockerfiles on PRs and push, Trivy scans
      - name: Build email-notifier image
        run: docker build -t email-notifier ./lambda/email-notifier

      - name: Scan email-notifier image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: email-notifier
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Build lead-processor image
        run: docker build -t lead-processor ./lambda/lead-processor

      - name: Scan lead-processor image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: lead-processor
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      # Only runs on push to main
      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@c962da2960ed15f492addc26fffa274485265950 # v2.0.2

      - name: Push email-notifier to ECR
        if: github.event_name == 'push'
        run: |
          docker tag email-notifier $ECR_REGISTRY/portfolio-leads-prod-email-notifier:${{ github.sha }}
          docker push $ECR_REGISTRY/portfolio-leads-prod-email-notifier:${{ github.sha }}

      - name: Push lead-processor to ECR
        if: github.event_name == 'push'
        run: |
          docker tag lead-processor $ECR_REGISTRY/portfolio-leads-prod-lead-processor:${{ github.sha }}
          docker push $ECR_REGISTRY/portfolio-leads-prod-lead-processor:${{ github.sha }}

      - name: Update email-notifier Lambda
        if: github.event_name == 'push'
        run: |
          aws lambda update-function-code \
            --function-name portfolio-leads-prod-email-notifier \
            --image-uri $ECR_REGISTRY/portfolio-leads-prod-email-notifier:${{ github.sha }}

      - name: Update lead-processor Lambda
        if: github.event_name == 'push'
        run: |
          aws lambda update-function-code \
            --function-name portfolio-leads-prod-lead-processor \
            --image-uri $ECR_REGISTRY/portfolio-leads-prod-lead-processor:${{ github.sha }}